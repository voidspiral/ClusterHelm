# Slave gateway runtime defaults
# Node exclusion — persisted across jobs on this gateway.

# File name under AGENT_JOB_DIR (default /home/smt/agents/var/agent-jobs)
exclude_store node-exclusions.json

# Preflight fail (ping/SSH) → mark excluded immediately
exclude_preflight_fail true

# Consecutive exec failures before exclusion (per node, per partition)
exclude_exec_fail_threshold 3

# Auto-clear exclusion after N seconds; 0 = until manual clear or success probe
exclude_ttl_seconds 3600

# --- Partition-local node status ---
# Query failures always fall back to the existing ping/SSH and exclusion store.
nodestatus_enabled true
nodestatus_bin /home/smt/agents/bin/nodestatus
nodestatus_gateway_config /etc/nodestatus/gateway.conf
nodestatus_query_timeout 5
nodestatus_unix_socket /run/nodestatus/nodestatus.sock
nodestatus_listen 0.0.0.0:9070
nodestatus_freshness 30s
nodestatus_heartbeat_timeout 60s
nodestatus_key_file /etc/nodestatus/partition.key

# --- Agent-to-agent runtime (jobs submitted with --prompt) ---
# CLI: opencode only
agent_opencode_bin /home/smt/.opencode/bin/opencode

# OpenCode agent name to run (opencode run --agent <name>)
agent_opencode_agent slave-agent

# --- MPI environment ---
# Paths for compiling and running MPI programs
mpi_mpicc /usr/bin/mpicc
mpi_mpirun /usr/bin/mpirun
