# Slave gateway runtime defaults
# Node exclusion — persisted across jobs on this gateway.

# File name under AGENT_JOB_DIR (default /var/agent-jobs)
exclude_store node-exclusions.json

# Preflight fail (ping/SSH) → mark excluded immediately
exclude_preflight_fail true

# Consecutive exec failures before exclusion (per node, per partition)
exclude_exec_fail_threshold 3

# Auto-clear exclusion after N seconds; 0 = until manual clear or success probe
exclude_ttl_seconds 3600
