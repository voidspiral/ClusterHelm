# Master agent runtime defaults
# Edit here; master-agent.mdc references this file — do not duplicate values in rules.

default_gateway cn1
default_partition test

# SSH timeouts (seconds)
submit_timeout 30
poll_timeout 15
ssh_connect_timeout 15

# Poll backoff schedule (comma-separated seconds, capped at last value)
poll_backoff 5,10,20,30
poll_max_rounds 20

# Remote paths on slave gateways
remote_project /home/code/agents
remote_run_slave scripts/jobs/run-slave.sh
